<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Manager Logic</title>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        :root { --primary: #1e293b; --secondary: #3b82f6; --success: #22c55e; --bg: #f1f5f9; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); }
        nav { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 2rem; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.2rem; }
        .card { background: white; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; border-top: 4px solid var(--secondary); }
        .card:hover { transform: translateY(-5px); }
        .view-section { display: none; background: white; padding: 2rem; border-radius: 12px; }
        .active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        /* Select2 override to match theme */
        .select2-container--default .select2-selection--single { height: 40px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .btn { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight:bold">ADMIN DASHBOARD</div>
        <div onclick="location.reload()" style="cursor:pointer">Logout</div>
    </nav>

    <div class="container">
        <div id="home-section" class="view-section active">
            <div class="dashboard-grid">
                <div class="card" onclick="openCategory('Tehsils')"><i>📍</i><h3>Tehsils</h3></div>
                <div class="card" onclick="openCategory('Managers')"><i>👤</i><h3>Managers</h3></div>
                <div class="card" onclick="openCategory('ManagerExpenses')"><i>💸</i><h3>Manager Exp</h3></div>
                <div class="card" onclick="openCategory('Salary')"><i>💳</i><h3>Salary</h3></div>
                <div class="card" onclick="openCategory('Income')"><i>💰</i><h3>Income</h3></div>
            </div>
        </div>

        <div id="category-section" class="view-section">
            <button class="btn" style="background:#64748b" onclick="showHome()">← Back</button>
            <h2 id="current-title">Category</h2>

            <div id="form-container" style="display:none; max-width: 600px; margin: 20px auto; border: 1px solid #ddd; padding: 20px; border-radius: 10px;">
                <form id="dynamic-form">
                    <input type="hidden" id="category-type" name="Category">
                    <input type="hidden" name="ID" id="input-id">
                    
                    <div class="form-group" id="manager-select-group" style="display:none;">
                        <label>Select Manager</label>
                        <select name="ManagerName" id="manager-dropdown" class="select2-field"></select>
                    </div>

                    <div class="form-group" id="tehsil-select-group">
                        <label>Tehsil</label>
                        <select name="ParentTehsil" id="tehsil-dropdown" class="select2-field"></select>
                    </div>

                    <div class="form-group" id="desc-group">
                        <label id="label-desc">Description</label>
                        <input type="text" name="Description" id="input-desc">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group" id="amount-group">
                            <label>Amount</label>
                            <input type="number" name="Amount">
                        </div>
                        <div class="form-group" id="date-group">
                            <label>Date</label>
                            <input type="date" name="Date">
                        </div>
                    </div>

                    <button type="submit" class="btn" id="submit-btn" style="width:100%">Save Data</button>
                </form>
            </div>

            <div id="data-list-container">
                <button onclick="prepareNewRecord()" class="btn" style="background: #3b82f6; margin-bottom: 20px;">+ Add New Entry</button>
                <div style="overflow-x:auto;">
                    <table>
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz3AFsk31Y5aEV8Ka_FJ28SfvFJQZPp0k71EfZBfWUJzExv7c3zb-lWUadJ_TY7KcfK5g/exec';
        let currentCategory = "", allData = [], isEditing = false, editRowNum = null;

        $(document).ready(function() {
            $('.select2-field').select2({ width: '100%' });
        });

        function showHome() {
            document.getElementById('category-section').classList.remove('active');
            document.getElementById('home-section').classList.add('active');
        }

        function toggleView(view) {
            document.getElementById('form-container').style.display = (view === 'form' ? 'block' : 'none');
            document.getElementById('data-list-container').style.display = (view === 'list' ? 'block' : 'none');
        }

        function openCategory(name) {
            currentCategory = name;
            toggleView('list');
            document.getElementById('home-section').classList.remove('active');
            document.getElementById('category-section').classList.add('active');
            document.getElementById('current-title').innerText = name;
            document.getElementById('category-type').value = name;

            // UI Visibility Logic
            document.getElementById('manager-select-group').style.display = (name === 'ManagerExpenses') ? 'block' : 'none';
            document.getElementById('tehsil-select-group').style.display = (name === 'Tehsils') ? 'none' : 'block';
            document.getElementById('amount-group').style.display = (['Tehsils', 'Managers'].includes(name)) ? 'none' : 'block';
            document.getElementById('date-group').style.display = (['Tehsils', 'Managers'].includes(name)) ? 'none' : 'block';
            
            // Description Label
            const descLabel = document.getElementById('label-desc');
            if (name === 'Managers') descLabel.innerText = "Manager Name";
            else if (name === 'Salary') descLabel.innerText = "Employee Name";
            else descLabel.innerText = "Description";

            fetchListData();
        }

        function fetchListData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "<tr><td colspan='8'>Loading...</td></tr>";
            fetch(scriptURL).then(res => res.json()).then(data => {
                allData = data;
                updateDropdowns();
                const filtered = data.filter(item => item.Category === currentCategory);
                renderTable(filtered);
            });
        }

        function renderTable(data) {
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            if (!data.length) { tbody.innerHTML = "<tr><td colspan='8'>No data found.</td></tr>"; return; }

            const headers = Object.keys(data[0]).filter(h => !['rowNum', 'Category', 'ID'].includes(h));
            thead.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}<th>Action</th></tr>`;
            
            tbody.innerHTML = data.map(row => `
                <tr>
                    ${headers.map(h => `<td>${row[h] || '-'}</td>`).join('')}
                    <td><button onclick='editRecord(${JSON.stringify(row)})' style='color:blue; border:none; background:none; cursor:pointer;'>Edit</button></td>
                </tr>
            `).join('');
        }

        function updateDropdowns() {
            // Update Tehsil Dropdown
            const tehsils = allData.filter(i => i.Category === 'Tehsils');
            let tOpts = '<option value="">Select Tehsil</option>' + tehsils.map(t => `<option value="${t.Description}">${t.Description}</option>`).join('');
            $('#tehsil-dropdown').html(tOpts);

            // Update Manager Dropdown (from Managers category)
            const managers = allData.filter(i => i.Category === 'Managers');
            let mOpts = '<option value="">Select Manager</option>' + managers.map(m => `<option value="${m.Description}">${m.Description}</option>`).join('');
            $('#manager-dropdown').html(mOpts);
        }

        function prepareNewRecord() {
            isEditing = false;
            document.getElementById('dynamic-form').reset();
            $('.select2-field').val(null).trigger('change');
            document.getElementById('category-type').value = currentCategory;
            
            // Auto-increment logic
            const catData = allData.filter(i => i.Category === currentCategory);
            let maxID = 0;
            catData.forEach(item => { if(parseInt(item.ID) > maxID) maxID = parseInt(item.ID); });
            document.getElementById('input-id').value = maxID + 1;
            
            toggleView('form');
        }

        function editRecord(data) {
            isEditing = true; editRowNum = data.rowNum;
            const f = document.getElementById('dynamic-form');
            f.querySelector('[name="ID"]').value = data.ID;
            f.querySelector('[name="Description"]').value = data.Description || '';
            if (data.Amount) f.querySelector('[name="Amount"]').value = data.Amount;
            if (data.Date) f.querySelector('[name="Date"]').value = data.Date.split('T')[0];
            
            // Select2 values update
            $('#tehsil-dropdown').val(data.ParentTehsil).trigger('change');
            $('#manager-dropdown').val(data.ManagerName).trigger('change');
            
            toggleView('form');
        }

        document.getElementById('dynamic-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "Saving...";
            
            let fd = new FormData(this);
            // Collect Select2 values manually if needed, but FormData usually handles it
            if (isEditing) { fd.append('action', 'UPDATE'); fd.append('rowNum', editRowNum); }
            
            fetch(scriptURL, { method: 'POST', body: fd }).then(() => {
                alert("Success!");
                toggleView('list');
                fetchListData();
                btn.disabled = false; btn.innerText = "Save Data";
            });
        });
    </script>
</body>
</html>
