<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Grid Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f4f7fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #1e293b !important; border-bottom: 3px solid #3b82f6; }
        
        .main-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); /* Stronger Shadow */
            border: 1px solid #e2e8f0;
        }

        .card-custom { 
            transition: all 0.3s ease; 
            border: none; border-top: 5px solid #0d6efd;
            cursor: pointer; border-radius: 12px;
        }
        .card-custom:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .view-section { display: none; }
        .active-section { display: block; }

        .form-label { font-weight: 600; color: #334155; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control, .form-select { border-radius: 8px; padding: 10px 15px; border: 1px solid #cbd5e1; }
        
        .input-group-text { background-color: #f8fafc; border-color: #cbd5e1; color: #64748b; }

        .btn-save { background: #22c55e; color: white; font-weight: bold; border-radius: 8px; padding: 12px; border: none; transition: 0.3s; }
        .btn-save:hover { background: #16a34a; transform: scale(1.01); }

        @media print {
            .no-print, .navbar, .btn, #form-container, #home-section, .breadcrumb, .select2-container, #filter-container { display: none !important; }
            .view-section { display: block !important; }
            .main-card { box-shadow: none; border: none; padding: 0; }
            table { width: 100% !important; border-collapse: collapse; }
            th, td { border: 1px solid #dee2e6 !important; padding: 8px !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark no-print mb-5 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="showHome()">
                <i class="fas fa-database me-2"></i>ADMIN SYSTEM
            </a>
            <button class="btn btn-outline-light btn-sm rounded-pill px-3" onclick="location.reload()">Logout</button>
        </div>
    </nav>

    <div class="container pb-5">
        
        <div id="home-section" class="view-section active-section">
            <div class="row g-4">
                <div class="col-md-4"><div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('Tehsils')"><i class="fas fa-map-marked-alt fa-3x text-primary mb-3"></i><h5 class="fw-bold">Tehsils</h5></div></div>
                <div class="col-md-4"><div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('Managers')"><i class="fas fa-user-tie fa-3x text-primary mb-3"></i><h5 class="fw-bold">Managers</h5></div></div>
                <div class="col-md-4"><div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('ManagerExpenses')"><i class="fas fa-file-invoice fa-3x text-primary mb-3"></i><h5 class="fw-bold">Manager Exp</h5></div></div>
                <div class="col-md-4"><div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('Salary')"><i class="fas fa-credit-card fa-3x text-primary mb-3"></i><h5 class="fw-bold">Salary</h5></div></div>
                <div class="col-md-4"><div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('Income')"><i class="fas fa-chart-line fa-3x text-primary mb-3"></i><h5 class="fw-bold">Income</h5></div></div>
            </div>
        </div>

        <div id="category-section" class="view-section">
            <div class="main-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 id="current-title" class="fw-bold m-0 text-dark">Category</h2>
                    <div class="no-print">
                        <button class="btn btn-primary px-4 shadow-sm me-2" onclick="prepareNewRecord()"><i class="fas fa-plus me-1"></i> Add Record</button>
                        <button class="btn btn-dark shadow-sm" onclick="window.print()"><i class="fas fa-print"></i></button>
                    </div>
                </div>

                <div id="form-container" class="mb-5 no-print p-4 border rounded-3 bg-white shadow-sm" style="display:none; border-top: 4px solid #22c55e !important;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold text-success m-0"><i class="fas fa-plus-circle me-2"></i>New Entry Details</h5>
                        <button type="button" class="btn-close" onclick="toggleView('list')"></button>
                    </div>
                    
                    <form id="dynamic-form">
                        <input type="hidden" id="category-type" name="Category">
                        <input type="hidden" name="ID" id="input-id">
                        
                        <div class="row g-4"> <div class="col-md-6" id="tehsil-select-group">
                                <label class="form-label">Tehsil / Area</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-map-pin"></i></span>
                                    <select name="ParentTehsil" id="tehsil-dropdown" class="select2-bs5"></select>
                                </div>
                            </div>

                            <div class="col-md-6" id="manager-select-group" style="display:none;">
                                <label class="form-label">Manager Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user-circle"></i></span>
                                    <select name="ManagerName" id="manager-dropdown" class="select2-bs5"></select>
                                </div>
                            </div>

                            <div class="col-md-6" id="amount-group">
                                <label class="form-label">Amount (PKR)</label>
                                <div class="input-group">
                                    <span class="input-group-text fw-bold">Rs.</span>
                                    <input type="number" name="Amount" class="form-control" placeholder="0">
                                </div>
                            </div>

                            <div class="col-md-6" id="date-group">
                                <label class="form-label">Select Date</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                                    <input type="date" name="Date" class="form-control">
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label" id="label-desc">Description</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-edit"></i></span>
                                    <input type="text" name="Description" class="form-control" placeholder="Enter full details here..." required>
                                </div>
                            </div>

                            <div class="col-12 text-center mt-2">
                                <button type="submit" class="btn btn-save w-100 shadow-sm" id="submit-btn">
                                    <i class="fas fa-save me-2"></i>SAVE RECORD
                                </button>
                            </div>

                        </div>
                    </form>
                </div>

                <div id="data-list-container">
                    <div id="filter-container" class="row g-2 mb-4 no-print border rounded p-3 bg-light mx-0">
                        <div class="col-md-4"><select id="filter-tehsil" class="form-select form-select-sm"></select></div>
                        <div class="col-md-3"><input type="date" id="filter-from" class="form-control form-control-sm"></div>
                        <div class="col-md-3"><input type="date" id="filter-to" class="form-control form-control-sm"></div>
                        <div class="col-md-2"><button class="btn btn-sm btn-primary w-100" onclick="applyFilters()">Filter</button></div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle border-top">
                            <thead class="table-light" id="table-head"></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz3AFsk31Y5aEV8Ka_FJ28SfvFJQZPp0k71EfZBfWUJzExv7c3zb-lWUadJ_TY7KcfK5g/exec';
        let currentCategory = "", allData = [], filteredCategoryData = [], isEditing = false, editRowNum = null;

        $(document).ready(function() {
            $('.select2-bs5').select2({ theme: 'bootstrap-5', width: '100%', placeholder: 'Select Option' });
        });

        function showHome() { $('#category-section').removeClass('active-section'); $('#home-section').addClass('active-section'); }

        function toggleView(view) {
            if(view === 'form') { $('#form-container').fadeIn(); $('#data-list-container').hide(); }
            else { $('#form-container').hide(); $('#data-list-container').fadeIn(); }
        }

        function openCategory(name) {
            currentCategory = name;
            toggleView('list');
            $('#home-section').removeClass('active-section');
            $('#category-section').addClass('active-section');
            $('#current-title').text(name);
            $('#category-type').val(name);

            $('#manager-select-group').toggle(name === 'ManagerExpenses');
            $('#tehsil-select-group').toggle(name !== 'Tehsils');
            $('#filter-container').toggle(!['Tehsils', 'Managers'].includes(name));
            $('#amount-group, #date-group').toggle(!['Tehsils', 'Managers'].includes(name));
            
            $('#label-desc').text(name === 'Managers' ? "Manager Name" : (name === 'Salary' ? "Employee Name" : "Description"));
            fetchListData();
        }

        function fetchListData() {
            $('#table-body').html("<tr><td colspan='10' class='text-center py-5'><div class='spinner-border text-primary'></div></td></tr>");
            fetch(scriptURL).then(res => res.json()).then(data => {
                allData = data;
                updateDropdowns();
                filteredCategoryData = data.filter(item => item.Category === currentCategory);
                renderTable(filteredCategoryData);
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            return isNaN(date) ? dateStr : date.toISOString().split('T')[0];
        }

        function renderTable(data) {
            if (!data.length) { $('#table-body').html("<tr><td colspan='10' class='text-center py-4'>No data available.</td></tr>"); return; }
            const headers = Object.keys(data[0]).filter(h => !['rowNum', 'Category', 'ID'].includes(h));
            $('#table-head').html(`<tr>${headers.map(h => `<th>${h}</th>`).join('')}<th class="no-print">Actions</th></tr>`);
            
            let total = 0;
            let rowsHtml = data.map(row => {
                if(row.Amount) total += parseFloat(row.Amount);
                return `<tr>
                    ${headers.map(h => `<td>${h === 'Date' ? formatDate(row[h]) : (row[h] || '-')}</td>`).join('')}
                    <td class="no-print">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick='editRecord(${JSON.stringify(row)})'><i class="fas fa-pen"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick='deleteRecord(${row.rowNum})'><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');

            if(!['Tehsils', 'Managers'].includes(currentCategory)) {
                rowsHtml += `<tr class="table-success fw-bold"><td>TOTAL</td><td colspan="10" class="text-primary h5">${total.toLocaleString()}</td></tr>`;
            }
            $('#table-body').html(rowsHtml);
        }

        function applyFilters() {
            const teh = $('#filter-tehsil').val();
            const from = $('#filter-from').val();
            const to = $('#filter-to').val();
            let res = filteredCategoryData;
            if(teh) res = res.filter(i => i.ParentTehsil === teh);
            if(from || to) {
                res = res.filter(i => {
                    if(!i.Date) return false;
                    const d = new Date(i.Date).setHours(0,0,0,0);
                    const s = from ? new Date(from).setHours(0,0,0,0) : null;
                    const e = to ? new Date(to).setHours(0,0,0,0) : null;
                    return (!s || d >= s) && (!e || d <= e);
                });
            }
            renderTable(res);
        }

        function deleteRecord(num) {
            if(!confirm("Are you sure?")) return;
            let fd = new FormData(); fd.append('action', 'DELETE'); fd.append('rowNum', num);
            fetch(scriptURL, { method: 'POST', body: fd }).then(() => { fetchListData(); });
        }

        function updateDropdowns() {
            const tehsils = allData.filter(i => i.Category === 'Tehsils');
            const managers = allData.filter(i => i.Category === 'Managers');
            $('#tehsil-dropdown, #filter-tehsil').html('<option value="">Select Tehsil</option>' + tehsils.map(t => `<option value="${t.Description}">${t.Description}</option>`).join(''));
            $('#manager-dropdown').html('<option value="">Select Manager</option>' + managers.map(m => `<option value="${m.Description}">${m.Description}</option>`).join(''));
        }

        function prepareNewRecord() {
            isEditing = false; $('#dynamic-form')[0].reset();
            $('.select2-bs5').val(null).trigger('change');
            const catData = allData.filter(i => i.Category === currentCategory);
            let maxID = 0;
            catData.forEach(item => { if(parseInt(item.ID) > maxID) maxID = parseInt(item.ID); });
            $('#input-id').val(maxID + 1);
            toggleView('form');
        }

        function editRecord(data) {
            isEditing = true; editRowNum = data.rowNum;
            const f = $('#dynamic-form');
            f.find('[name="ID"]').val(data.ID);
            f.find('[name="Description"]').val(data.Description);
            if(data.Amount) f.find('[name="Amount"]').val(data.Amount);
            if(data.Date) f.find('[name="Date"]').val(formatDate(data.Date));
            $('#tehsil-dropdown').val(data.ParentTehsil).trigger('change');
            $('#manager-dropdown').val(data.ManagerName).trigger('change');
            toggleView('form');
        }

        $('#dynamic-form').on('submit', function(e) {
            e.preventDefault();
            const btn = $('#submit-btn');
            btn.prop('disabled', true).html("<i class='fas fa-spinner fa-spin me-2'></i>Saving...");
            let fd = new FormData(this);
            if(isEditing) { fd.append('action', 'UPDATE'); fd.append('rowNum', editRowNum); }
            fetch(scriptURL, { method: 'POST', body: fd }).then(() => {
                toggleView('list'); fetchListData();
                btn.prop('disabled', false).html("<i class='fas fa-save me-2'></i>SAVE RECORD");
            });
        });
    </script>
</body>
</html>
