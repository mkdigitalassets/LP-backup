<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin & Manager Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f4f7fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #1e293b !important; border-bottom: 3px solid #3b82f6; }
        .main-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        .card-custom { transition: all 0.3s ease; border: none; border-top: 5px solid #0d6efd; cursor: pointer; border-radius: 12px; }
        .card-custom:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .view-section { display: none; }
        .active-section { display: block; }
        .form-label { font-weight: 600; color: #334155; font-size: 0.85rem; text-transform: uppercase; }
        .form-control, .form-select { border-radius: 8px; padding: 10px 15px; border: 1px solid #cbd5e1; }
        .btn-save { background: #22c55e; color: white; font-weight: bold; border-radius: 8px; padding: 12px; border: none; width: 100%; }
        
        /* Login Screen Style */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #1e293b; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        .summary-box { padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; color: white; }
        .bg-income { background: #22c55e; }
        .bg-expense { background: #ef4444; }
        .bg-balance { background: #3b82f6; }

        @media print {
            .no-print, .navbar, .btn, #form-container, #home-section, #filter-container, #login-overlay { display: none !important; }
            .view-section { display: block !important; }
            .main-card { box-shadow: none; border: none; padding: 0; }
            table { width: 100% !important; border-collapse: collapse; }
            th, td { border: 1px solid #dee2e6 !important; padding: 8px !important; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <div class="text-center mb-4">
                <i class="fas fa-lock fa-3x text-primary mb-2"></i>
                <h3 class="fw-bold">Login System</h3>
                <p class="text-muted small">Enter credentials to continue</p>
            </div>
            <div class="mb-3">
                <label class="form-label">Username / Manager Name</label>
                <input type="text" id="login-user" class="form-control" placeholder="admin or manager name">
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" id="login-pass" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn btn-primary w-100 py-2 fw-bold" onclick="handleLogin()">ENTER PANEL</button>
            <div id="login-error" class="text-danger mt-3 text-center small" style="display:none;">Invalid details!</div>
        </div>
    </div>

    <nav class="navbar navbar-dark no-print mb-5 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="showHome()"><i class="fas fa-layer-group me-2"></i>ADMIN PANEL</a>
            <button class="btn btn-sm btn-outline-light rounded-pill px-3" onclick="location.reload()">Logout</button>
        </div>
    </nav>

    <div class="container pb-5">
        
        <div id="home-section" class="view-section active-section">
            <div class="row g-4 text-center" id="dashboard-items">
                </div>
        </div>

        <div id="category-section" class="view-section">
            <div class="main-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 id="current-title" class="fw-bold m-0">Category</h2>
                    <div class="no-print" id="action-buttons">
                        <button class="btn btn-primary px-4 shadow-sm me-2" onclick="prepareNewRecord()"><i class="fas fa-plus me-1"></i> Add Record</button>
                        <button class="btn btn-dark shadow-sm" onclick="window.print()"><i class="fas fa-print"></i></button>
                    </div>
                </div>

                <div id="summary-highlights" class="row g-3 no-print mb-4" style="display:none;">
                    <div class="col-md-4"><div class="summary-box bg-income"><h6>Total Income</h6><h3 id="sum-income">0</h3></div></div>
                    <div class="col-md-4"><div class="summary-box bg-expense"><h6>Total Expenses</h6><h3 id="sum-expense">0</h3></div></div>
                    <div class="col-md-4"><div class="summary-box bg-balance"><h6>Remaining Balance</h6><h3 id="sum-balance">0</h3></div></div>
                </div>

                <div id="form-container" class="mb-5 no-print p-4 border rounded-3 bg-white shadow-sm" style="display:none; border-top: 4px solid #22c55e !important;">
                    <form id="dynamic-form">
                        <input type="hidden" id="category-type" name="Category">
                        <input type="hidden" name="ID" id="input-id">
                        <div class="row g-4">
                            <div class="col-md-6" id="tehsil-select-group">
                                <label class="form-label">Tehsil</label>
                                <select name="ParentTehsil" id="tehsil-dropdown" class="select2-bs5"></select>
                            </div>
                            <div class="col-md-6" id="manager-select-group" style="display:none;">
                                <label class="form-label">Manager</label>
                                <select name="ManagerName" id="manager-dropdown" class="select2-bs5"></select>
                            </div>
                            <div class="col-md-6" id="machinary-select-group" style="display:none;">
                                <label class="form-label">Machinery</label>
                                <select name="MachinaryName" id="machinary-dropdown" class="select2-bs5"></select>
                            </div>
                            <div class="col-md-6" id="password-group" style="display:none;">
                                <label class="form-label">Manager Login Password</label>
                                <input type="text" name="Password" class="form-control" placeholder="Set password for manager">
                            </div>

                            <div class="col-md-6" id="amount-group">
                                <label class="form-label">Amount</label>
                                <input type="number" name="Amount" class="form-control" placeholder="0">
                            </div>
                            <div class="col-md-6" id="date-group">
                                <label class="form-label">Date</label>
                                <input type="date" name="Date" class="form-control">
                            </div>
                            <div class="col-12" id="desc-group">
                                <label class="form-label" id="label-desc">Description</label>
                                <input type="text" name="Description" class="form-control" required>
                            </div>
                            <div class="col-12 text-center">
                                <button type="submit" class="btn btn-save shadow-sm" id="submit-btn">SAVE RECORD</button>
                                <button type="button" class="btn btn-link text-danger mt-2" onclick="toggleView('list')">Cancel</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div id="data-list-container">
                    <div id="filter-container" class="row g-2 mb-4 no-print border rounded p-3 bg-light mx-0">
                        <div class="col-md-4"><select id="filter-tehsil" class="form-select form-select-sm"></select></div>
                        <div class="col-md-3"><input type="date" id="filter-from" class="form-control form-control-sm"></div>
                        <div class="col-md-3"><input type="date" id="filter-to" class="form-control form-control-sm"></div>
                        <div class="col-md-2"><button class="btn btn-sm btn-primary w-100" id="filter-btn" onclick="applyFilters()">Filter</button></div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle border-top">
                            <thead class="table-dark" id="table-head"></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz3AFsk31Y5aEV8Ka_FJ28SfvFJQZPp0k71EfZBfWUJzExv7c3zb-lWUadJ_TY7KcfK5g/exec';
        let currentUser = { role: '', name: '' };
        let allData = [], currentCategory = "";

        // Admin Credentials
        const adminUser = "admin";
        const adminPass = "12345";

        function handleLogin() {
            const user = $('#login-user').val();
            const pass = $('#login-pass').val();

            if(user === adminUser && pass === adminPass) {
                currentUser = { role: 'admin', name: 'Admin' };
                startApp();
            } else {
                // Check in Managers data from Sheet
                fetch(scriptURL).then(res => res.json()).then(data => {
                    const manager = data.find(i => i.Category === 'Managers' && i.Description === user && i.Password === pass);
                    if(manager) {
                        currentUser = { role: 'manager', name: manager.Description };
                        startApp();
                    } else {
                        $('#login-error').fadeIn();
                    }
                });
            }
        }

        function startApp() {
            $('#login-overlay').fadeOut();
            renderDashboard();
            fetchListData();
        }

        function renderDashboard() {
            let html = '';
            if(currentUser.role === 'admin') {
                html = `
                    <div class="col-md-12"><div class="card h-100 card-custom p-4 shadow-sm" onclick="openFinalReport()"><i class="fas fa-chart-pie fa-3x text-primary mb-3"></i><h4 class="fw-bold">FINAL REPORT</h4></div></div>
                    <div class="col-md-4"><div class="card h-100 card-custom p-4 shadow-sm" onclick="openCategory('Tehsils')"><i class="fas fa-map-location-dot fa-2x text-primary mb-2"></i><h6>Tehsils</h6></div></div>
                    <div class="col-md-4"><div class="card h-100 card-custom p-4 shadow-sm" onclick="openCategory('Managers')"><i class="fas fa-user-tie fa-2x text-primary mb-2"></i><h6>Managers</h6></div></div>
                    <div class="col-md-4"><div class="card h-100 card-custom p-4 shadow-sm" onclick="openCategory('ManagerExpenses')"><i class="fas fa-wallet fa-2x text-primary mb-2"></i><h6>Manager Exp</h6></div></div>
                    <div class="col-md-4"><div class="card h-100 card-custom p-4 shadow-sm" onclick="openCategory('Machinary')"><i class="fas fa-tractor fa-2x text-primary mb-2"></i><h6>Machinary</h6></div></div>
                    <div class="col-md-4"><div class="card h-100 card-custom p-4 shadow-sm" onclick="openCategory('MachinaryExpenses')"><i class="fas fa-tools fa-2x text-primary mb-2"></i><h6>Machinary Exp</h6></div></div>
                    <div class="col-md-4"><div class="card h-100 card-custom p-4 shadow-sm" onclick="openCategory('Income')"><i class="fas fa-sack-dollar fa-2x text-success mb-2"></i><h6 class="text-success">Income</h6></div></div>
                `;
            } else {
                html = `
                    <div class="col-md-12"><div class="card h-100 card-custom p-5 shadow-sm" onclick="openCategory('ManagerExpenses')"><i class="fas fa-file-invoice-dollar fa-4x text-primary mb-3"></i><h3 class="fw-bold">ADD MY EXPENSES</h3><p>Welcome, ${currentUser.name}</p></div></div>
                `;
            }
            $('#dashboard-items').html(html);
        }

        function openCategory(name) {
            currentCategory = name;
            $('#summary-highlights').hide();
            $('#action-buttons button:first-child').show();
            toggleView('list');
            $('#home-section').removeClass('active-section');
            $('#category-section').addClass('active-section');
            $('#current-title').text(name);
            $('#category-type').val(name);

            // Access Control: Manager only enters their name
            $('#manager-select-group').toggle(name === 'ManagerExpenses' && currentUser.role === 'admin');
            $('#password-group').toggle(name === 'Managers');
            $('#machinary-select-group').toggle(name === 'MachinaryExpenses');
            $('#tehsil-select-group').toggle(name !== 'Tehsils');
            
            const isEntry = !['Tehsils', 'Managers', 'Machinary'].includes(name);
            $('#filter-container, #amount-group, #date-group').toggle(isEntry);
            
            fetchListData();
        }

        function fetchListData() {
            $('#table-body').html("<tr><td colspan='10' class='text-center py-5'><div class='spinner-grow text-primary'></div></td></tr>");
            fetch(scriptURL).then(res => res.json()).then(data => {
                allData = data;
                updateDropdowns();
                let filtered = data.filter(item => item.Category === currentCategory);
                
                // Manager filters: only see their own expenses
                if(currentUser.role === 'manager' && currentCategory === 'ManagerExpenses') {
                    filtered = filtered.filter(i => i.ManagerName === currentUser.name);
                }
                
                renderTable(filtered);
            });
        }

        function prepareNewRecord() {
            isEditing = false; $('#dynamic-form')[0].reset();
            if(currentUser.role === 'manager') {
                // Auto fill manager name if manager is logged in
                $('#manager-dropdown').val(currentUser.name).trigger('change');
            }
            toggleView('form');
        }

        // --- Baqi logic same rahay gi (RenderTable, Edit, Delete, etc.) ---
        // (Note: Sirf Manager category mein 'Password' field sheet mein save honi chahiye)

        function showHome() { $('#category-section').removeClass('active-section'); $('#home-section').addClass('active-section'); }
        function toggleView(view) { if(view === 'form') { $('#form-container').show(); $('#data-list-container').hide(); } else { $('#form-container').hide(); $('#data-list-container').show(); } }
        
        function renderTable(data) {
            if (!data.length) { $('#table-body').html("<tr><td colspan='10' class='text-center py-4'>No Data.</td></tr>"); return; }
            const headers = Object.keys(data[0]).filter(h => !['rowNum', 'Category', 'ID', 'Password'].includes(h));
            $('#table-head').html(`<tr>${headers.map(h => `<th>${h}</th>`).join('')}<th class="no-print">Actions</th></tr>`);
            let rowsHtml = data.map(row => `<tr>${headers.map(h => `<td>${h === 'Date' ? row[h].split('T')[0] : (row[h] || '-')}</td>`).join('')}<td class="no-print"><button class="btn btn-sm btn-outline-primary" onclick='editRecord(${JSON.stringify(row)})'><i class="fas fa-pen"></i></button></td></tr>`).join('');
            $('#table-body').html(rowsHtml);
        }

        function updateDropdowns() {
            const tehsils = allData.filter(i => i.Category === 'Tehsils');
            const managers = allData.filter(i => i.Category === 'Managers');
            const machinary = allData.filter(i => i.Category === 'Machinary');
            $('#tehsil-dropdown, #filter-tehsil').html('<option value="">Select Tehsil</option>' + tehsils.map(t => `<option value="${t.Description}">${t.Description}</option>`).join(''));
            $('#manager-dropdown').html('<option value="">Select Manager</option>' + managers.map(m => `<option value="${m.Description}">${m.Description}</option>`).join(''));
            $('#machinary-dropdown').html('<option value="">Select Machinery</option>' + machinary.map(m => `<option value="${m.Description}">${m.Description}</option>`).join(''));
        }

        $('#dynamic-form').on('submit', function(e) {
            e.preventDefault();
            const btn = $('#submit-btn'); btn.prop('disabled', true).text("Saving...");
            let fd = new FormData(this);
            if(currentUser.role === 'manager') fd.append('ManagerName', currentUser.name);
            fetch(scriptURL, { method: 'POST', body: fd }).then(() => { toggleView('list'); fetchListData(); btn.prop('disabled', false).text("SAVE RECORD"); });
        });
    </script>
</body>
</html>
