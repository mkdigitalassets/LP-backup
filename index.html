<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Pro Version</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .navbar { background-color: #1e293b !important; }
        .card-custom { 
            transition: all 0.3s ease; 
            border: none; 
            border-top: 5px solid #3b82f6;
            cursor: pointer;
            border-radius: 12px;
        }
        .card-custom:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .view-section { display: none; }
        .active-section { display: block; }
        .table-container { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* PRINT LOGIC - SIRF REPORT NAZAR AAYE */
        @media print {
            .no-print, .navbar, .btn, .breadcrumb, #form-container, #home-section { display: none !important; }
            .view-section { display: block !important; }
            .table-container { box-shadow: none; padding: 0; border: none; }
            .container { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            table { width: 100% !important; border: 1px solid #000; }
            th, td { border: 1px solid #ddd !important; padding: 8px !important; }
            #current-title { text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark no-print mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="showHome()">
                <i class="fas fa-shield-halved me-2"></i>ADMIN PANEL
            </a>
            <button class="btn btn-outline-light btn-sm" onclick="location.reload()">Logout</button>
        </div>
    </nav>

    <div class="container">
        
        <div id="home-section" class="view-section active-section">
            <h4 class="mb-4 fw-bold text-dark text-center">Main Management Console</h4>
            <div class="row g-4 justify-content-center">
                <div class="col-md-4">
                    <div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('Tehsils')">
                        <i class="fas fa-location-dot fa-3x text-primary mb-3"></i>
                        <h5 class="fw-bold">Tehsils</h5>
                        <p class="text-muted small m-0">Manage Operational Areas</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('Managers')">
                        <i class="fas fa-user-tie fa-3x text-primary mb-3"></i>
                        <h5 class="fw-bold">Managers</h5>
                        <p class="text-muted small m-0">Team Profiles</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('ManagerExpenses')">
                        <i class="fas fa-file-invoice-dollar fa-3x text-primary mb-3"></i>
                        <h5 class="fw-bold">Manager Exp</h5>
                        <p class="text-muted small m-0">Track Spendings</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('Salary')">
                        <i class="fas fa-money-bill-transfer fa-3x text-primary mb-3"></i>
                        <h5 class="fw-bold">Salary</h5>
                        <p class="text-muted small m-0">Payroll & Records</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 card-custom text-center p-4 shadow-sm" onclick="openCategory('Income')">
                        <i class="fas fa-coins fa-3x text-primary mb-3"></i>
                        <h5 class="fw-bold">Income</h5>
                        <p class="text-muted small m-0">Revenue Logs</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="category-section" class="view-section">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <div>
                    <button class="btn btn-sm btn-secondary no-print mb-2" onclick="showHome()"><i class="fas fa-arrow-left"></i></button>
                    <h2 id="current-title" class="fw-bold m-0">Report Name</h2>
                </div>
                <div class="no-print">
                    <button class="btn btn-primary shadow-sm me-2" onclick="prepareNewRecord()">
                        <i class="fas fa-plus"></i> New Record
                    </button>
                    <button class="btn btn-dark shadow-sm" onclick="window.print()">
                        <i class="fas fa-print"></i> Print Report
                    </button>
                </div>
            </div>

            <div id="form-container" class="card border-0 shadow-sm mb-4 no-print" style="display:none;">
                <div class="card-body bg-light rounded-3">
                    <form id="dynamic-form" class="row g-3">
                        <input type="hidden" id="category-type" name="Category">
                        <input type="hidden" name="ID" id="input-id">
                        
                        <div class="col-md-6" id="manager-select-group" style="display:none;">
                            <label class="form-label fw-bold">Select Manager</label>
                            <select name="ManagerName" id="manager-dropdown" class="select2-bs5"></select>
                        </div>

                        <div class="col-md-6" id="tehsil-select-group">
                            <label class="form-label fw-bold">Select Tehsil</label>
                            <select name="ParentTehsil" id="tehsil-dropdown" class="select2-bs5"></select>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold" id="label-desc">Description</label>
                            <input type="text" name="Description" class="form-control form-control-lg" required>
                        </div>

                        <div class="col-md-6" id="amount-group">
                            <label class="form-label fw-bold">Amount</label>
                            <input type="number" name="Amount" class="form-control">
                        </div>

                        <div class="col-md-6" id="date-group">
                            <label class="form-label fw-bold">Date</label>
                            <input type="date" name="Date" class="form-control">
                        </div>

                        <div class="col-12 mt-4 text-end">
                            <button type="button" class="btn btn-link text-muted me-3" onclick="toggleView('list')">Cancel</button>
                            <button type="submit" class="btn btn-success btn-lg px-5 shadow" id="submit-btn">Save Record</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="data-list-container" class="table-container shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark" id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz3AFsk31Y5aEV8Ka_FJ28SfvFJQZPp0k71EfZBfWUJzExv7c3zb-lWUadJ_TY7KcfK5g/exec';
        let currentCategory = "", allData = [], isEditing = false, editRowNum = null;

        $(document).ready(function() {
            $('.select2-bs5').select2({ theme: 'bootstrap-5', width: '100%', placeholder: 'Click to select' });
        });

        function showHome() {
            $('#category-section').removeClass('active-section');
            $('#home-section').addClass('active-section');
        }

        function toggleView(view) {
            if(view === 'form') { $('#form-container').fadeIn(); $('#data-list-container').hide(); }
            else { $('#form-container').hide(); $('#data-list-container').fadeIn(); }
        }

        function openCategory(name) {
            currentCategory = name;
            toggleView('list');
            $('#home-section').removeClass('active-section');
            $('#category-section').addClass('active-section');
            $('#current-title').text(name + " Report");
            $('#category-type').val(name);

            $('#manager-select-group').toggle(name === 'ManagerExpenses');
            $('#tehsil-select-group').toggle(name !== 'Tehsils');
            $('#amount-group, #date-group').toggle(!['Tehsils', 'Managers'].includes(name));
            
            const descLabel = (name === 'Managers') ? "Full Name" : (name === 'Salary' ? "Employee Name" : "Description");
            $('#label-desc').text(descLabel);

            fetchListData();
        }

        function fetchListData() {
            $('#table-body').html("<tr><td colspan='10' class='text-center py-5'><div class='spinner-border text-primary'></div></td></tr>");
            fetch(scriptURL).then(res => res.json()).then(data => {
                allData = data;
                updateDropdowns();
                renderTable(data.filter(item => item.Category === currentCategory));
            });
        }

        function renderTable(data) {
            if (!data.length) { $('#table-body').html("<tr><td colspan='10' class='text-center py-4'>No data available.</td></tr>"); return; }

            const headers = Object.keys(data[0]).filter(h => !['rowNum', 'Category', 'ID'].includes(h));
            $('#table-head').html(`<tr>${headers.map(h => `<th class="py-3 px-3">${h}</th>`).join('')}<th class="no-print">Actions</th></tr>`);
            
            let totalAmt = 0;
            let rowsHtml = data.map(row => {
                if(row.Amount) totalAmt += parseFloat(row.Amount);
                return `<tr>
                    ${headers.map(h => `<td class="px-3">${row[h] || '-'}</td>`).join('')}
                    <td class="no-print">
                        <button class="btn btn-sm btn-primary me-1" onclick='editRecord(${JSON.stringify(row)})'><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger" onclick='deleteRecord(${row.rowNum})'><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');

            // ADD TOTAL ROW (if category has Amount)
            if(!['Tehsils', 'Managers'].includes(currentCategory)) {
                rowsHtml += `<tr class="table-info fw-bold"><td colspan="${headers.indexOf('Amount')}">TOTAL</td><td>${totalAmt.toLocaleString()}</td><td colspan="2"></td></tr>`;
            }

            $('#table-body').html(rowsHtml);
        }

        function deleteRecord(num) {
            if(!confirm("Are you sure you want to delete this record permanently?")) return;
            const btn = event.target.closest('button');
            btn.disabled = true;
            let fd = new FormData(); fd.append('action', 'DELETE'); fd.append('rowNum', num);
            fetch(scriptURL, { method: 'POST', body: fd }).then(() => { alert("Record Deleted!"); fetchListData(); });
        }

        function updateDropdowns() {
            const tehsils = allData.filter(i => i.Category === 'Tehsils');
            const managers = allData.filter(i => i.Category === 'Managers');
            $('#tehsil-dropdown').html('<option></option>' + tehsils.map(t => `<option value="${t.Description}">${t.Description}</option>`).join(''));
            $('#manager-dropdown').html('<option></option>' + managers.map(m => `<option value="${m.Description}">${m.Description}</option>`).join(''));
        }

        function prepareNewRecord() {
            isEditing = false; $('#dynamic-form')[0].reset();
            $('.select2-bs5').val(null).trigger('change');
            const catData = allData.filter(i => i.Category === currentCategory);
            let maxID = 0;
            catData.forEach(item => { if(parseInt(item.ID) > maxID) maxID = parseInt(item.ID); });
            $('#input-id').val(maxID + 1);
            toggleView('form');
        }

        function editRecord(data) {
            isEditing = true; editRowNum = data.rowNum;
            const f = $('#dynamic-form');
            f.find('[name="ID"]').val(data.ID);
            f.find('[name="Description"]').val(data.Description);
            if (data.Amount) f.find('[name="Amount"]').val(data.Amount);
            if (data.Date) f.find('[name="Date"]').val(data.Date.split('T')[0]);
            $('#tehsil-dropdown').val(data.ParentTehsil).trigger('change');
            $('#manager-dropdown').val(data.ManagerName).trigger('change');
            toggleView('form');
        }

        $('#dynamic-form').on('submit', function(e) {
            e.preventDefault();
            const btn = $('#submit-btn');
            btn.prop('disabled', true).text("Processing...");
            let fd = new FormData(this);
            if (isEditing) { fd.append('action', 'UPDATE'); fd.append('rowNum', editRowNum); }
            fetch(scriptURL, { method: 'POST', body: fd }).then(() => {
                toggleView('list'); fetchListData();
                btn.prop('disabled', false).text("Save Record");
            });
        });
    </script>
</body>
</html>
